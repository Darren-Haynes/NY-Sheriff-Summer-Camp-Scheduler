name: CI

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main
      - testing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm' # enables npm cache

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Print versions (debug)
        run: |
          echo "Host Node:"
          node -v
          npm -v
          echo "Electron (if available):"
          npx electron --version || echo "electron binary not installed"
          npx electron --eval "console.log('electron', process.versions.electron, 'node', process.versions.node, 'chrome', process.versions.chrome)" || true

      - name: Run Vitest & coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload Vitest coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: vitest-coverage-report
          path: coverage

      - name: Build Electron app for e2e tests
        run: npm run package
        env:
          CI: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright e2e tests
        run: cross-env TEST_RUN=true NODE_ENV=test playwright test && nyc report
        env:
          CI: true

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 30

      - name: Merge coverage reports
        run: |
          mkdir -p .nyc_output
          if [ -d ".nyc_output" ] && [ "$(ls -A .nyc_output)" ]; then
            echo "E2E coverage found, merging with Vitest coverage..."
          fi

      - name: Generate combined coverage report
        run: |
          npm run coverage:report || true

      - name: Upload combined coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
