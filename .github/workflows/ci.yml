name: CI

on:
  push:
    branches:
      - main
      - testing
  pull_request:
    branches:
      - main
      - testing

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm' # enables npm cache

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Print versions (debug)
        run: |
          echo "Host Node:"
          node -v
          npm -v
          echo "Electron (if available):"
          npx electron --version || echo "electron binary not installed"
          npx electron --eval "console.log('electron', process.versions.electron, 'node', process.versions.node, 'chrome', process.versions.chrome)" || true

      - name: Run tests & coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
